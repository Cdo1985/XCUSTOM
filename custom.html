        .stat-input {
            width: 100%;

        }

        }
        /* Responsive stat grid for ALL devices */
.stat-input-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 16px;
    margin-bottom: 24px;
}

.totals-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 12px;
}

/* Tablet */
@media (max-width: 900px) {
    .stat-input-grid,
    .totals-grid {
        grid-template-columns: repeat(3, 1fr);
    }
}

/* Mobile */

    .stat-input-grid,
    .totals-grid {

<body>
    <div class="header">
        <div class="header-content">
            <div>
                <div class="header-title">AFL STATS</div>
                <div class="header-subtitle" id="yearDisplay">2026 Season</div>
            </div>
        </div>
        <button class="add-btn" onclick="toggleAddForm()">+</button>
    </div>

    <div class="add-form" id="addForm">
        <input type="text" id="playerNameInput" placeholder="Enter player name..." onkeypress="if(event.key===&#39;Enter&#39;) addPlayer()">
        <button onclick="addPlayer()">Add</button>
    </div>

    <div class="main-content">
        <div id="content">
                    <div class="empty-state">
                        <div class="empty-icon">✍️🏉🥇💾</div>
                        <p class="empty-text">No players yet</p>
                        <p class="empty-subtext">Tap the + button to add a player</p>
                    </div>
                </div>
    </div>

    <script>
        const statLabels = {
            G: { label: 'Goals', color: '#DC2626' },
            B: { label: 'Behinds', color: '#F59E0B' },
            M: { label: 'Marks', color: '#3B82F6' },
            T: { label: 'Tackles', color: '#10B981' },
            K: { label: 'Kicks', color: '#800080' },
            H: { label: 'Handballs', color: '#008000' },
            A: { label: 'Assists', color: '#8B5CF6' }
        };

        const currentYear = new Date().getFullYear();
        let kids = [];

        // Load data
        function loadData() {
            const stored = localStorage.getItem('afl-kids');
            if (stored) {
                try {
                    kids = JSON.parse(stored);
                } catch (e) {
                    kids = [];
                }
            }
            document.getElementById('yearDisplay').textContent = `${currentYear} Season`;
            render();
        }

        // Save data
        function saveData() {
            localStorage.setItem('afl-kids', JSON.stringify(kids));
            render();
        }

        // Toggle add form
        function toggleAddForm() {
            const form = document.getElementById('addForm');
            form.classList.toggle('show');
            if (form.classList.contains('show')) {
                document.getElementById('playerNameInput').focus();
            }
        }

        // Add player
        function addPlayer() {
            const nameInput = document.getElementById('playerNameInput');
            const name = nameInput.value.trim();
            
            if (name) {
                kids.push({
                    id: Date.now(),
                    name: name,
                    year: currentYear,
                    stats: { G: 0, B: 0, M: 0, T: 0, K: 0, H: 0, A: 0 }
                });
                saveData();
                nameInput.value = '';
                document.getElementById('addForm').classList.remove('show');
            }
        }

        // Update stat
        function updateStat(kidId, stat, value) {
            const kid = kids.find(k => k.id === kidId);
            if (kid) {
                kid.stats[stat] = Math.max(0, parseInt(value) || 0);
                saveData();
            }
        }

        // Delete player
        function deletePlayer(kidId) {
            kids = kids.filter(k => k.id !== kidId);
            saveData();
        }

        // Render
        function render() {
            const contentDiv = document.getElementById('content');
            
            if (kids.length === 0) {
                contentDiv.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">✍️🏉🥇💾</div>
                        <p class="empty-text">No players yet</p>
                        <p class="empty-subtext">Tap the + button to add a player</p>
                    </div>
                `;
                return;
            }

            let html = '<div class="kids-list">';
            
            kids.forEach(kid => {
                html += `
                    <div class="kid-card">
                        <div class="kid-header">
                            <h2 class="kid-name">${escapeHtml(kid.name)}</h2>
                            <button class="delete-btn" onclick="deletePlayer(${kid.id})">❌</button>
                        </div>
                        <div class="stats-grid">
                            <div class="stat-input-grid">
                `;

                ['G', 'B', 'M', 'T', 'K', 'H', 'A'].forEach(stat => {
                    const label = statLabels[stat];
                    html += `
                        <div class="stat-column">
                            <label class="stat-label">${stat}</label>
                            <input 
                                type="number" 
                                min="0" 
                                value="${kid.stats[stat]}"
                                onchange="updateStat(${kid.id}, '${stat}', this.value)"
                                class="stat-input"
                                style="border-color: ${label.color}; color: ${label.color};"
                            >
                            <p class="stat-name">${label.label}</p>
                        </div>
                    `;
                });

                html += `
                            </div>
                            <div class="totals-section">
                                <p class="totals-label">${currentYear} Totals</p>
                                <div class="totals-grid">
                `;

                ['G', 'B', 'M', 'T', 'K', 'H', 'A'].forEach(stat => {
                    const label = statLabels[stat];
                    html += `
                        <div class="total-box" style="background-color: ${label.color}15; color: ${label.color};">
                            ${kid.stats[stat]}
                        </div>
                    `;
                });

                html += `
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });

            html += '</div>';
            contentDiv.innerHTML = html;
        }

        // Escape HTML
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Initialize
        loadData();
    </script>
